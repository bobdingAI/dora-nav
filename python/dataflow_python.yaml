# dataflow_python.yaml — All-Python dora-nav navigation pipeline
#
# Drop-in replacement for the C++ dora-nav nodes. Runs on macOS and Linux
# without requiring CMake builds or the dora C API static library.
#
# Same binary formats (Pose2D_h, CurPose_h, SteeringCmd_h, TrqBreCmd_h,
# RoadAttri_h) as the C++ nodes — fully wire-compatible.
#
# Prerequisites:
#   pip install dora-rs pyarrow numpy scipy
#   MuJoCo simulation node (dora-mujoco) or real robot providing:
#     - joint_positions (qpos array) on 10ms tick
#     - wheel_control input (4 floats: speed_l, speed_r, steer_l, steer_r)
#
# Run standalone (with MuJoCo):
#   export DORA_MUJOCO_PATH=/path/to/dora-mujoco
#   dora up && dora start python/dataflow_python.yaml --attach

nodes:
  # =======================================
  # Waypoint Publisher (replaces C++ pubroad)
  # =======================================
  - id: pub-road
    path: pub_road_node.py
    inputs:
      tick: dora/timer/millis/200
    outputs:
      - road_lane
    env:
      WAYPOINTS_FILE: "../map/pub_road/Waypoints.txt"

  # =======================================
  # Pose → Frenet Converter (replaces C++ road_lane_publisher_node)
  # =======================================
  - id: road-lane-publisher
    path: road_lane_publisher_node.py
    inputs:
      road_lane: pub-road/road_lane
      cur_pose: pose-extractor/ground_truth_pose
    outputs:
      - cur_pose_all

  # =======================================
  # Pose Extractor (MuJoCo qpos → Pose2D_h)
  # =======================================
  - id: pose-extractor
    path: pose_extractor_node.py
    inputs:
      joint_positions: mujoco-sim/joint_positions
    outputs:
      - ground_truth_pose

  # =======================================
  # Road Attributes (replaces C++ task_pub_node)
  # =======================================
  - id: task-pub-stub
    path: task_pub_stub.py
    inputs:
      tick: dora/timer/millis/100
    outputs:
      - road_attri_msg

  # =======================================
  # Obstacle Detector (Phase 1) — lidar → obstacle list
  # =======================================
  - id: obstacle-detector
    path: obstacle_detector_node.py
    inputs:
      pointcloud: mujoco-sim/pointcloud
      ground_truth_pose: pose-extractor/ground_truth_pose
      road_lane: pub-road/road_lane
    outputs:
      - obstacle_list
    env:
      GROUND_THRESHOLD: "0.15"
      MAX_DETECT_RANGE: "15.0"
      CLUSTER_TOLERANCE: "0.5"

  # =======================================
  # Costmap (Phase 2) — lidar → 2D occupancy grid
  # =======================================
  - id: costmap
    path: costmap_node.py
    inputs:
      pointcloud: mujoco-sim/pointcloud
      ground_truth_pose: pose-extractor/ground_truth_pose
    outputs:
      - costmap_grid
    env:
      COSTMAP_RESOLUTION: "0.1"
      COSTMAP_SIZE_M: "20.0"
      INFLATION_RADIUS: "0.5"

  # =======================================
  # Frenet Path Planner (replaces C++ routing_planning_node)
  # =======================================
  - id: planning
    path: planning_node.py
    inputs:
      road_lane: pub-road/road_lane
      cur_pose_all: road-lane-publisher/cur_pose_all
      road_attri_msg: task-pub-stub/road_attri_msg
      obstacle_list: obstacle-detector/obstacle_list
      costmap_grid: costmap/costmap_grid
      recovery_cmd: recovery-monitor/recovery_cmd
    outputs:
      - raw_path
      - Request

  # =======================================
  # Longitudinal Control (replaces C++ lon_controller_node)
  # =======================================
  - id: lon-control
    path: lon_controller_node.py
    inputs:
      Request: planning/Request
    outputs:
      - TrqBreCmd

  # =======================================
  # Lateral Control — Pure Pursuit (replaces C++ lat_controller_node)
  # =======================================
  - id: lat-control
    path: lat_controller_node.py
    inputs:
      raw_path: planning/raw_path
    outputs:
      - SteeringCmd

  # =======================================
  # Recovery Monitor (Phase 3) — stuck detection + recovery
  # =======================================
  - id: recovery-monitor
    path: recovery_monitor_node.py
    inputs:
      ground_truth_pose: pose-extractor/ground_truth_pose
      Request: planning/Request
    outputs:
      - recovery_cmd

  # =======================================
  # Rerun 3D Visualization
  # =======================================
  - id: rerun
    path: rerun_viz_node.py
    inputs:
      raw_path: planning/raw_path
      cur_pose: pose-extractor/ground_truth_pose
      obstacle_list: obstacle-detector/obstacle_list
      costmap_grid: costmap/costmap_grid
    env:
      WAYPOINTS_FILE: "../map/pub_road/Waypoints.txt"
      MAP_PCD_FILE: "../data/map.pcd"
